# specs-agent web — nginx config
#
# Serves the Vite-built SPA from /usr/share/nginx/html.
# Proxies /api/* to the FastAPI backend (api:8765 inside Docker network).
# Proxies /ws/*  to the backend's WebSocket endpoints.
# All other paths fall through to index.html for client-side routing.

upstream api_backend {
    server api:8765;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Static assets (hashed by Vite, cache forever) ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- API proxy (strip /api prefix) ---
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running spec loads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- WebSocket proxy ---
    location /api/ws/ {
        proxy_pass http://api_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering — send frames immediately for real-time updates
        proxy_buffering off;
        proxy_cache off;

        # Keep WS alive during long test runs
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
