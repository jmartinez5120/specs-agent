swagger: "2.0"
info:
  title: Petstore
  version: "1.0.0"
  description: A sample Petstore API (Swagger 2.0)
host: petstore.example.com
basePath: /v1
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          required: false
          type: integer
          default: 20
          description: Maximum number of pets to return
      responses:
        "200":
          description: A list of pets
          schema:
            type: array
            items:
              $ref: "#/definitions/Pet"
        "500":
          description: Internal server error
    post:
      operationId: createPet
      summary: Create a pet
      tags:
        - pets
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/NewPet"
      responses:
        "201":
          description: Pet created
          schema:
            $ref: "#/definitions/Pet"
        "400":
          description: Invalid input
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          type: string
      responses:
        "200":
          description: A single pet
          schema:
            $ref: "#/definitions/Pet"
        "404":
          description: Pet not found
    delete:
      operationId: deletePet
      summary: Delete a pet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          type: string
      responses:
        "204":
          description: Pet deleted
        "404":
          description: Pet not found
definitions:
  Pet:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
      tag:
        type: string
      status:
        type: string
        enum:
          - available
          - pending
          - sold
  NewPet:
    type: object
    required:
      - name
    properties:
      name:
        type: string
      tag:
        type: string
