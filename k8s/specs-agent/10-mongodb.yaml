# MongoDB 4.4 — single-node replica set (rs0).
#
# Why 4.4 (not 7+): the K3s cluster runs on Raspberry Pi (ARMv8-A).
# Mongo 5.0+ and 4.4.19+ require ARMv8.2-A and crash on Pi hardware
# (see SERVER-71772). 4.4.x stays compatible. Change streams (the
# feature we actually need) have been GA since 3.6, so 4.4 is fine.
#
# Why a replica set on one node: the search indexer tails change streams,
# which require a replica set even when there's only one member. This
# matches the docker-compose dev setup so the same code runs in both.
#
# Storage: 10Gi PVC on the default local-path storage class. For real HA
# scale this StatefulSet to 3 replicas, switch to longhorn/rook for
# distributed storage, and rewrite the rs0 init Job to reference all three
# pods. Single-node is enough for a shared dev/test ecosystem.
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: specs-agent
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: specs-agent-platform
spec:
  clusterIP: None  # headless — StatefulSet needs stable DNS per pod
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
  selector:
    app.kubernetes.io/name: mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: specs-agent
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: specs-agent-platform
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/part-of: specs-agent-platform
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongod
          image: mongo:4.4.18
          imagePullPolicy: IfNotPresent
          args: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
          ports:
            - containerPort: 27017
              name: mongo
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          # mongosh startup on a Raspberry Pi is ~3-5s. The default probe
          # timeoutSeconds=1 kills the container in a probe loop.
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: local-path
---
# One-shot init: idempotently calls rs.initiate(). Restart strategy is
# OnFailure; once the replica set is up, the job exits 0 and stays Done.
apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-init
  namespace: specs-agent
  labels:
    app.kubernetes.io/name: mongodb-init
    app.kubernetes.io/part-of: specs-agent-platform
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 6
  template:
    metadata:
      # Required for the NetworkPolicy that allows init→mongo on 27017.
      labels:
        app.kubernetes.io/name: mongodb-init
        app.kubernetes.io/part-of: specs-agent-platform
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: mongo:4.4.18
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -c
            - |
              set -e
              echo "[mongo-init] waiting for mongod..."
              until mongo --host mongo-0.mongo.specs-agent.svc.cluster.local:27017 \
                --quiet --eval "db.adminCommand('ping').ok" >/dev/null 2>&1; do
                sleep 2
              done
              echo "[mongo-init] mongod is up; ensuring replica set rs0..."
              # Note: in the legacy mongo shell rs.status() returns
              # {ok:0, codeName:"NotYetInitialized"} — it does NOT throw.
              # So we must check .ok explicitly, not rely on try/catch.
              mongo --host mongo-0.mongo.specs-agent.svc.cluster.local:27017 --quiet --eval '
                var s = rs.status();
                if (s.ok === 1) {
                  print("[mongo-init] replica set already initialized");
                } else {
                  print("[mongo-init] initiating replica set...");
                  rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongo-0.mongo.specs-agent.svc.cluster.local:27017" }] });
                }
              '
              echo "[mongo-init] done"
