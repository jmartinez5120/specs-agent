# Elasticsearch 8.x — single-node, security disabled (matches dev compose).
#
# For a real enterprise rollout: enable xpack.security, supply TLS certs
# via a Secret, and scale to 3 master-eligible nodes. Single-node is
# enough to validate the multi-tenant schema and the change-stream
# indexer — production hardening is the next milestone.
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: specs-agent
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: specs-agent-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
  selector:
    app.kubernetes.io/name: elasticsearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: specs-agent
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: specs-agent-platform
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch
        app.kubernetes.io/part-of: specs-agent-platform
    spec:
      terminationGracePeriodSeconds: 30
      # ES needs a few sysctl/file-descriptor settings on a fresh host.
      # On Raspberry Pi K3s these usually default fine; if startup fails
      # check `vm.max_map_count` on the node.
      initContainers:
        - name: chown-data
          image: busybox:1.37
          command: ["sh", "-c", "chown -R 1000:0 /usr/share/elasticsearch/data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
          imagePullPolicy: IfNotPresent
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: cluster.name
              value: specs-agent-es
            - name: bootstrap.memory_lock
              value: "false"
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: local-path
