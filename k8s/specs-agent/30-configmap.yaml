# Non-sensitive runtime config for the specs-agent API.
#
# These values become env vars on every API pod. They map directly to the
# SPECS_AGENT_* knobs that AppConfig already understands (see
# src/specs_agent/config.py — `_env_str` / `_env_bool` helpers). Anything
# secret (API keys) lives in the Secret next door, NOT here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: specs-agent-config
  namespace: specs-agent
  labels:
    app.kubernetes.io/name: specs-agent
    app.kubernetes.io/part-of: specs-agent-platform
data:
  # Storage backend — Mongo with change streams enables real-time search.
  SPECS_AGENT_STORAGE: "mongo"
  SPECS_AGENT_MONGO_URL: "mongodb://mongo-0.mongo.specs-agent.svc.cluster.local:27017/?replicaSet=rs0&directConnection=true"
  SPECS_AGENT_MONGO_DB: "specs_agent"
  # Search
  ELASTICSEARCH_URL: "http://elasticsearch.specs-agent.svc.cluster.local:9200"
  # API binding
  SPECS_AGENT_HOST: "0.0.0.0"
  SPECS_AGENT_PORT: "8765"
  # AI defaults — provider-driven. The actual API keys come from the Secret;
  # these set the *server-default* provider/model. Each user can override
  # via the AI Settings panel and the override is stored per-user once the
  # multi-tenancy MVP lands; today they overwrite the server default.
  SPECS_AGENT_AI_ENABLED: "1"
  SPECS_AGENT_AI_PROVIDER: "anthropic"
  SPECS_AGENT_AI_ANTHROPIC_MODEL: "claude-haiku-4-5"
  SPECS_AGENT_AI_OPENAI_MODEL: "gpt-4o-mini"
  # Identity hint for the multi-tenancy plumbing — single-user "shared"
  # default until OIDC lands. Tenant-aware Ingress can override this header.
  SPECS_AGENT_DEFAULT_USER_ID: "shared"
