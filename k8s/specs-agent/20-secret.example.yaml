# EXAMPLE secret — copy to 20-secret.yaml (gitignored) and fill in real values,
# OR create directly with `kubectl create secret`:
#
#   kubectl -n specs-agent create secret generic specs-agent-ai-keys \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=OPENAI_API_KEY=sk-...
#
# Never commit a real key to git. The .gitignore excludes 20-secret.yaml
# and any *-secret.yaml in this folder for that reason.
apiVersion: v1
kind: Secret
metadata:
  name: specs-agent-ai-keys
  namespace: specs-agent
  labels:
    app.kubernetes.io/name: specs-agent
    app.kubernetes.io/part-of: specs-agent-platform
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "sk-ant-REPLACE-ME"
  OPENAI_API_KEY: "sk-REPLACE-ME"
  # Optional — only if using openai_compatible provider with a hosted endpoint:
  HTTP_API_KEY: ""
